[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "petunia"
version = "0.0.1"
description = "Whole-slide digital image I/O"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "ymvk" }]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Image Processing",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/petunia"]
