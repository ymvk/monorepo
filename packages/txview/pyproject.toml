[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "txview"
version = "0.1.0"
description = "Plot transcript models for a gene from a GTF in the terminal."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "ymvk" }]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Environment :: Console",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
]

[project.scripts]
txview = "txview.__main__:main"

[project.optional-dependencies]
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/txview"]
