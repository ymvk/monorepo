[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "txplot"
version = "0.1.0"
description = "Transcript model figures with composable genomic and protein coordinate systems."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "ymvk" }]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Topic :: Scientific/Engineering :: Visualization",
]
dependencies = [
    "matplotlib>=3.7",
    "numpy>=1.24",
    "pandas>=2.0",
    "glasbey>=0.2",
]

[project.optional-dependencies]
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["src/txplot"]
