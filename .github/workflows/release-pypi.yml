name: release-pypi

on:
  push:
    tags: ['*-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - id: pkg
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          name="${tag%-v*}"
          version="${tag##*-v}"
          if [ ! -f "packages/$name/pyproject.toml" ]; then
            echo "No pyproject.toml at packages/$name — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - if: steps.pkg.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - if: steps.pkg.outputs.skip != 'true'
        working-directory: packages/${{ steps.pkg.outputs.name }}
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - if: steps.pkg.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ steps.pkg.outputs.name }}/dist
