name: release-ghcr

on:
  push:
    tags: ['*-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: pkg
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          name="${tag%-v*}"
          version="${tag##*-v}"
          if [ ! -f "packages/$name/Dockerfile" ]; then
            echo "No Dockerfile at packages/$name — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - if: steps.pkg.outputs.skip != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.pkg.outputs.skip != 'true'
        uses: docker/build-push-action@v5
        with:
          context: packages/${{ steps.pkg.outputs.name }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ steps.pkg.outputs.name }}:${{ steps.pkg.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ steps.pkg.outputs.name }}:latest
